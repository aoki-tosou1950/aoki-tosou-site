<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>施工事例 | 有限会社 青木塗装工業</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      background: #f4f6f8;
      color: #333;
      line-height: 1.6;
    }

    /* ヘッダー */
    .site-header {
      background: #0d3b66;
      color: white;
      padding: 14px 20px;
    }
    .site-header a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 13px;
      display: block;
      margin-bottom: 4px;
    }
    .site-header a:hover { color: white; }
    .site-header h1 { font-size: 18px; letter-spacing: 1px; }

    /* ページタイトル */
    .page-hero {
      background: #0d3b66;
      color: white;
      text-align: center;
      padding: 36px 20px 32px;
      border-top: 1px solid rgba(255,255,255,0.15);
    }
    .page-hero h2 { font-size: 22px; margin-bottom: 8px; }
    .page-hero p  { font-size: 13px; opacity: 0.82; }

    /* メインコンテンツ */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 28px 16px 48px;
    }

    /* カードグリッド */
    .works-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 22px;
    }

    /* カード */
    .works-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .works-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.13);
    }

    /* 施工写真 */
    .works-card img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
    }
    .no-image {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: #e8ecf0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 13px;
    }

    /* カード本文 */
    .card-body {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card-title {
      font-size: 15px;
      font-weight: bold;
      line-height: 1.5;
    }

    .tag-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      background: #0d3b66;
      color: white;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
    }

    /* カードフッター（ボタン） */
    .card-footer {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn-detail {
      display: block;
      text-align: center;
      padding: 10px;
      border: 2px solid #0d3b66;
      color: #0d3b66;
      border-radius: 6px;
      font-size: 14px;
      font-weight: bold;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
    }
    .btn-detail:hover { background: #0d3b66; color: white; }

    .btn-line {
      display: block;
      text-align: center;
      padding: 10px;
      background: #06c755;
      color: white;
      border-radius: 6px;
      font-size: 14px;
      font-weight: bold;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn-line:hover { background: #05a847; }

    /* トップへ戻るリンク */
    .back-link {
      text-align: center;
      margin-top: 36px;
    }
    .back-link a {
      color: #0d3b66;
      text-decoration: none;
      font-size: 14px;
      border-bottom: 1px solid #0d3b66;
      padding-bottom: 2px;
    }

    /* スマホ */
    @media (max-width: 480px) {
      .site-header h1 { font-size: 16px; }
      .page-hero h2   { font-size: 20px; }
      .works-grid     { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
